<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Trivia | Easy Miles</title>
<style>
  :root {
    --cream: #FAF6F1;
    --slate: #2C3E50;
    --slate-deep: #1F2933;
    --sage: #7C9885;
    --coral: #E8967A;
    --line: #E4DCD0;
    --good: #6f9c7a;
    --bad: #c97b63;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--slate-deep), var(--slate));
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app-card {
    background: var(--cream);
    color: var(--slate-deep);
    border-radius: 18px;
    max-width: 560px;
    width: 100%;
    padding: 2.25rem 2rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
  }

  h1 {
    font-family: Georgia, serif;
    font-size: 1.5rem;
    margin: 0 0 0.3rem;
    text-align: center;
  }

  .subtitle {
    text-align: center;
    color: #5b675f;
    margin: 0 0 1.5rem;
    font-size: 0.92rem;
  }

  /* ---- top status row: score + timer ---- */
  .status-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.25rem;
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--slate);
  }

  .score-pill {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.4rem 0.9rem;
  }

  .timer-pill {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 0.4rem 0.9rem;
    min-width: 64px;
    text-align: center;
  }

  .timer-pill.warning { color: var(--bad); border-color: var(--bad); }

  .timer-bar-track {
    width: 100%;
    height: 6px;
    background: var(--line);
    border-radius: 999px;
    margin-bottom: 1.5rem;
    overflow: hidden;
  }

  .timer-bar-fill {
    height: 100%;
    background: var(--coral);
    border-radius: 999px;
    width: 100%;
    transition: width 0.2s linear;
  }

  /* ---- question ---- */
  .question-box {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
    text-align: center;
    font-size: 1.08rem;
    font-weight: 600;
    min-height: 70px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .answer-btn {
    border: 2px solid var(--line);
    background: #fff;
    border-radius: 10px;
    padding: 0.85rem 0.6rem;
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 600;
    color: var(--slate);
    transition: all 0.15s ease;
  }

  .answer-btn:hover:not(:disabled) {
    border-color: var(--coral);
  }

  .answer-btn.correct {
    background: var(--good);
    border-color: var(--good);
    color: #fff;
  }

  .answer-btn.incorrect {
    background: var(--bad);
    border-color: var(--bad);
    color: #fff;
  }

  .answer-btn:disabled {
    cursor: default;
    opacity: 0.85;
  }

  .feedback {
    text-align: center;
    font-size: 0.92rem;
    font-weight: 600;
    min-height: 22px;
    margin-bottom: 1rem;
  }

  .feedback.good { color: var(--good); }
  .feedback.bad { color: var(--bad); }

  .next-btn {
    width: 100%;
    background: var(--slate-deep);
    color: var(--cream);
    border: none;
    border-radius: 999px;
    padding: 0.8rem;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .next-btn:hover { background: var(--coral); color: var(--slate-deep); }
  .next-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* ---- start / end screens ---- */
  .screen { text-align: center; }

  .screen p { color: #5b675f; margin-bottom: 1.5rem; }

  .big-btn {
    background: var(--slate-deep);
    color: var(--cream);
    border: none;
    border-radius: 999px;
    padding: 0.85rem 1.8rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }

  .big-btn:hover { background: var(--coral); color: var(--slate-deep); }

  .final-score {
    font-size: 2.4rem;
    font-weight: 700;
    color: var(--coral);
    margin: 0.5rem 0 0.25rem;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    color: var(--cream);
    opacity: 0.8;
    font-size: 0.85rem;
  }

  .hidden { display: none; }
</style>
</head>
<body>

  <div>
    <div class="app-card">
      <h1>Running Trivia</h1>
      <p class="subtitle">Ten questions. Twelve seconds each. Let's see what you know.</p>

      <!-- START SCREEN -->
      <div id="startScreen" class="screen">
        <p>Test your running knowledge against the clock &mdash; a correct answer is worth more
          points the faster you answer.</p>
        <button class="big-btn" id="startBtn">Start the Quiz</button>
      </div>

      <!-- GAME SCREEN -->
      <div id="gameScreen" class="hidden">
        <div class="status-row">
          <span class="score-pill">Score: <span id="scoreDisplay">0</span></span>
          <span>Question <span id="qNum">1</span>/<span id="qTotal">10</span></span>
          <span class="timer-pill" id="timerPill">12s</span>
        </div>
        <div class="timer-bar-track">
          <div class="timer-bar-fill" id="timerBar"></div>
        </div>

        <div class="question-box" id="questionText">Loading question...</div>

        <div class="answers" id="answersGrid"></div>

        <div class="feedback" id="feedbackText"></div>

        <button class="next-btn" id="nextBtn" disabled>Next Question</button>
      </div>

      <!-- END SCREEN -->
      <div id="endScreen" class="screen hidden">
        <p style="margin-bottom: 0.25rem;">Final score</p>
        <div class="final-score" id="finalScore">0</div>
        <p id="endMessage">Nice work.</p>
        <button class="big-btn" id="restartBtn">Play Again</button>
      </div>

    </div>
    <a href="index.html" class="back-link">&larr; Back to the home page</a>
  </div>

<script>
  const questions = [
    {
      q: "What is the standard distance of a marathon?",
      options: ["24.2 miles", "26.2 miles", "28.2 miles", "22 miles"],
      correct: 1
    },
    {
      q: "Which country has dominated distance running for decades, producing many world record holders?",
      options: ["Kenya", "Canada", "Japan", "Germany"],
      correct: 0
    },
    {
      q: "What term describes a runner's burst of euphoria during a long run?",
      options: ["Carb crash", "Runner's high", "Lactic spike", "Second wind"],
      correct: 1
    },
    {
      q: "How many laps around a standard outdoor track equal one mile?",
      options: ["2 laps", "3 laps", "4 laps", "5 laps"],
      correct: 2
    },
    {
      q: "What is the term for a runner's fastest sustainable pace over a long distance?",
      options: ["Sprint pace", "Threshold pace", "Taper pace", "Cadence"],
      correct: 1
    },
    {
      q: "Which of these is a common cause of 'hitting the wall' in a marathon?",
      options: ["Too much stretching", "Glycogen depletion", "Overhydration", "Cold weather"],
      correct: 1
    },
    {
      q: "What does VO2 max measure?",
      options: ["Shoe cushioning", "Maximum oxygen the body can use during exercise", "Stride length", "Heart rate recovery time"],
      correct: 1
    },
    {
      q: "What is a 'negative split' in running?",
      options: ["Running the second half faster than the first", "Running with no shoes", "Skipping a workout", "Running backwards"],
      correct: 0
    },
    {
      q: "Which Olympic event is the shortest standard distance race?",
      options: ["1500m", "100m", "5000m", "800m"],
      correct: 1
    },
    {
      q: "What is the recommended way to start a training plan after time off?",
      options: ["Sprint immediately", "Gradually build mileage", "Run a marathon first", "Skip warmups"],
      correct: 1
    }
  ];

  let currentIndex = 0;
  let score = 0;
  let timeLeft = 12;
  let timerInterval = null;
  let answered = false;
  const TIME_LIMIT = 12;

  const startScreen = document.getElementById("startScreen");
  const gameScreen = document.getElementById("gameScreen");
  const endScreen = document.getElementById("endScreen");
  const startBtn = document.getElementById("startBtn");
  const restartBtn = document.getElementById("restartBtn");
  const nextBtn = document.getElementById("nextBtn");
  const scoreDisplay = document.getElementById("scoreDisplay");
  const qNum = document.getElementById("qNum");
  const qTotal = document.getElementById("qTotal");
  const timerPill = document.getElementById("timerPill");
  const timerBar = document.getElementById("timerBar");
  const questionText = document.getElementById("questionText");
  const answersGrid = document.getElementById("answersGrid");
  const feedbackText = document.getElementById("feedbackText");
  const finalScore = document.getElementById("finalScore");
  const endMessage = document.getElementById("endMessage");

  qTotal.textContent = questions.length;

  startBtn.addEventListener("click", startGame);
  restartBtn.addEventListener("click", startGame);
  nextBtn.addEventListener("click", goToNextQuestion);

  function startGame() {
    currentIndex = 0;
    score = 0;
    scoreDisplay.textContent = score;
    startScreen.classList.add("hidden");
    endScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    loadQuestion();
  }

  function loadQuestion() {
    answered = false;
    feedbackText.textContent = "";
    feedbackText.className = "feedback";
    nextBtn.disabled = true;
    qNum.textContent = currentIndex + 1;

    const current = questions[currentIndex];
    questionText.textContent = current.q;

    answersGrid.innerHTML = "";
    current.options.forEach((opt, i) => {
      const btn = document.createElement("button");
      btn.className = "answer-btn";
      btn.textContent = opt;
      btn.addEventListener("click", () => selectAnswer(i));
      answersGrid.appendChild(btn);
    });

    startTimer();
  }

  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = TIME_LIMIT;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft -= 0.1;
      if (timeLeft <= 0) {
        timeLeft = 0;
        updateTimerDisplay();
        clearInterval(timerInterval);
        if (!answered) {
          handleTimeout();
        }
      } else {
        updateTimerDisplay();
      }
    }, 100);
  }

  function updateTimerDisplay() {
    timerPill.textContent = Math.ceil(timeLeft) + "s";
    const pct = (timeLeft / TIME_LIMIT) * 100;
    timerBar.style.width = pct + "%";
    if (timeLeft <= 4) {
      timerPill.classList.add("warning");
    } else {
      timerPill.classList.remove("warning");
    }
  }

  function selectAnswer(index) {
    if (answered) return;
    answered = true;
    clearInterval(timerInterval);

    const current = questions[currentIndex];
    const buttons = answersGrid.querySelectorAll(".answer-btn");
    buttons.forEach(b => b.disabled = true);

    if (index === current.correct) {
      buttons[index].classList.add("correct");
      const speedBonus = Math.max(0, Math.round(timeLeft * 5));
      const points = 10 + speedBonus;
      score += points;
      scoreDisplay.textContent = score;
      feedbackText.textContent = "Correct! +" + points + " points";
      feedbackText.classList.add("good");
    } else {
      buttons[index].classList.add("incorrect");
      buttons[current.correct].classList.add("correct");
      feedbackText.textContent = "Not quite &mdash; the right answer is highlighted.";
      feedbackText.textContent = "Not quite — the right answer is highlighted.";
      feedbackText.classList.add("bad");
    }

    nextBtn.disabled = false;
  }

  function handleTimeout() {
    answered = true;
    const current = questions[currentIndex];
    const buttons = answersGrid.querySelectorAll(".answer-btn");
    buttons.forEach(b => b.disabled = true);
    buttons[current.correct].classList.add("correct");
    feedbackText.textContent = "Time's up! The right answer is highlighted.";
    feedbackText.classList.add("bad");
    nextBtn.disabled = false;
  }

  function goToNextQuestion() {
    currentIndex++;
    if (currentIndex >= questions.length) {
      endGame();
    } else {
      loadQuestion();
    }
  }

  function endGame() {
    clearInterval(timerInterval);
    gameScreen.classList.add("hidden");
    endScreen.classList.remove("hidden");
    finalScore.textContent = score;

    const maxPossible = questions.length * (10 + TIME_LIMIT * 5);
    const pct = score / maxPossible;
    if (pct > 0.75) {
      endMessage.textContent = "Strong finish — that's a fast pace and a sharp memory.";
    } else if (pct > 0.45) {
      endMessage.textContent = "Solid effort. A few more reps and you'll have it down.";
    } else {
      endMessage.textContent = "Good first lap — give it another go.";
    }
  }
</script>

</body>
</html>
