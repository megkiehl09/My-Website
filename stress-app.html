<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stress &amp; Streak | Easy Miles</title>
<style>
  :root {
    --cream: #FAF6F1;
    --slate: #2C3E50;
    --slate-deep: #1F2933;
    --sage: #7C9885;
    --coral: #E8967A;
    --line: #E4DCD0;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Inter', -apple-system, sans-serif;
    background: linear-gradient(135deg, var(--slate-deep), var(--slate));
    color: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .app-card {
    background: var(--cream);
    color: var(--slate-deep);
    border-radius: 18px;
    max-width: 520px;
    width: 100%;
    padding: 2.5rem 2rem;
    box-shadow: 0 24px 60px rgba(0,0,0,0.35);
  }

  h1 {
    font-family: Georgia, serif;
    font-size: 1.6rem;
    margin: 0 0 0.4rem;
    text-align: center;
  }

  .subtitle {
    text-align: center;
    color: #5b675f;
    margin: 0 0 1.75rem;
    font-size: 0.95rem;
  }

  .stress-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .stress-btn {
    flex: 1;
    border: 2px solid var(--line);
    background: #fff;
    border-radius: 10px;
    padding: 0.75rem 0.4rem;
    cursor: pointer;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--slate);
    transition: all 0.15s ease;
  }

  .stress-btn:hover {
    border-color: var(--coral);
  }

  .stress-btn.selected {
    background: var(--coral);
    border-color: var(--coral);
    color: #fff;
  }

  .result-box {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 1.5rem;
    min-height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    margin-bottom: 1.5rem;
    font-size: 1.05rem;
    line-height: 1.5;
  }

  .result-box.placeholder {
    color: #9aa39c;
    font-size: 0.95rem;
    font-style: italic;
  }

  .generate-btn {
    width: 100%;
    background: var(--slate-deep);
    color: var(--cream);
    border: none;
    border-radius: 999px;
    padding: 0.85rem;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .generate-btn:hover {
    background: var(--coral);
    color: var(--slate-deep);
  }

  .generate-btn:disabled {
    background: #ccc;
    cursor: not-allowed;
  }

  .streak-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 1.5rem;
    padding-top: 1.25rem;
    border-top: 1px dashed var(--line);
    font-size: 0.9rem;
    color: #5b675f;
  }

  .streak-count {
    font-weight: 700;
    color: var(--coral);
    font-size: 1.1rem;
  }

  .reset-link {
    background: none;
    border: none;
    color: #9aa39c;
    text-decoration: underline;
    cursor: pointer;
    font-size: 0.85rem;
  }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.5rem;
    color: var(--cream);
    opacity: 0.8;
    font-size: 0.85rem;
  }
</style>
</head>
<body>

  <div>
    <div class="app-card">
      <h1>Stress &amp; Streak</h1>
      <p class="subtitle">Pick how stressed you feel right now and get something back &mdash;
        a quote when you need it, a joke when you don't.</p>

      <div class="stress-row" id="stressRow">
        <button class="stress-btn" data-level="low">😌 Low</button>
        <button class="stress-btn" data-level="medium">😐 Medium</button>
        <button class="stress-btn" data-level="high">😤 High</button>
      </div>

      <div class="result-box placeholder" id="resultBox">
        Pick a stress level, then hit generate.
      </div>

      <button class="generate-btn" id="generateBtn" disabled>Generate</button>

      <div class="streak-row">
        <span>Current streak: <span class="streak-count" id="streakCount">0</span></span>
        <button class="reset-link" id="resetBtn">reset streak</button>
      </div>
    </div>
    <a href="scratch.html" class="back-link">&larr; Back to the scratch page</a>
  </div>

<script>
  const content = {
    low: [
      "Easy days build the base nobody sees on race day.",
      "You don't have to run far today. You just have to run.",
      "A slow mile still counts as a mile.",
      "Joke: Why did the runner stay calm before the race? Because she had already tapered her expectations."
    ],
    medium: [
      "The mile won't fix everything, but it'll fix something.",
      "Lace up. Worry less. Repeat.",
      "Whatever's stuck in your head usually loosens up by mile two.",
      "Joke: Running is just expensive walking with better playlists."
    ],
    high: [
      "You don't need a plan today. You just need the door.",
      "Run it out before you think it out.",
      "The road doesn't care how bad your day was. Neither should you, for the next twenty minutes.",
      "Joke: Stress is temporary. So is this run. Both end eventually."
    ]
  };

  let selectedLevel = null;
  let streak = 0;

  const stressButtons = document.querySelectorAll(".stress-btn");
  const generateBtn = document.getElementById("generateBtn");
  const resultBox = document.getElementById("resultBox");
  const streakCount = document.getElementById("streakCount");
  const resetBtn = document.getElementById("resetBtn");

  stressButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      stressButtons.forEach(b => b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedLevel = btn.getAttribute("data-level");
      generateBtn.disabled = false;
    });
  });

  generateBtn.addEventListener("click", () => {
    if (!selectedLevel) return;
    const options = content[selectedLevel];
    const pick = options[Math.floor(Math.random() * options.length)];
    resultBox.textContent = pick;
    resultBox.classList.remove("placeholder");
    streak += 1;
    streakCount.textContent = streak;
  });

  resetBtn.addEventListener("click", () => {
    streak = 0;
    streakCount.textContent = streak;
    resultBox.textContent = "Pick a stress level, then hit generate.";
    resultBox.classList.add("placeholder");
    selectedLevel = null;
    stressButtons.forEach(b => b.classList.remove("selected"));
    generateBtn.disabled = true;
  });
</script>

</body>
</html>
